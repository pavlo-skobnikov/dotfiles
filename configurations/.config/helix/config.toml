theme = "catppuccin_frappe"

[editor]
mouse = false
shell = ["/opt/homebrew/bin/fish"]
line-number = "relative"
cursorline = true
completion-timeout = 50
rulers = [80, 100, 120]
color-modes = true
popup-border = "menu"
end-of-line-diagnostics = "hint"
inline-diagnostics.cursor-line = "warning"
clipboard-provider = "pasteboard"

[editor.statusline]
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.lsp]
display-progress-messages = true
display-inlay-hints = true

[editor.cursor-shape]
select = "underline"

[editor.file-picker]
hidden = false

[editor.auto-pairs]
'(' = ')'
'{' = '}'
'[' = ']'
'"' = '"'
'`' = '`'
'<' = '>'

[editor.whitespace]
tab = "all"
nbsp = "all"
nnbsp = "all"

[editor.whitespace.characters]
tab = "→"
tabpad = "·"
nbsp = "⍽"
nnbsp = "␣"

[editor.indent-guides]
render = true

[editor.smart-tab]
enable = false

[keys.normal]
"A-w" = "move_next_sub_word_start"
"A-e" = "move_next_sub_word_end"
"A-b" = "move_prev_sub_word_start"

x = "extend_line_below"
"A-x" = "extend_line_above"
X = "extend_to_line_bounds"
"A-X" = "shrink_to_line_bounds"

"{" = "goto_prev_paragraph"
"}" = "goto_next_paragraph"

[keys.normal."["]
'"' = '@?"<ret>hmim'
"'" = "@?'<ret>hmim"
"<" = "@?<lt><ret>lmim"
">" = "@?<gt><ret>hmim"
"(" = "@?\\(<ret>lmim"
")" = "@?\\)<ret>hmim"
"[" = "@?\\[<ret>lmim"
"]" = "@?\\]<ret>hmim"
"{" = "@?\\{<ret>lmim"
"}" = "@?\\}<ret>hmim"

[keys.normal."]"]
'"' = '@/"<ret>lmim'
"'" = "@/'<ret>lmim"
"<" = "@/<lt><ret>lmim"
">" = "@/<gt><ret>hmim"
"(" = "@/\\(<ret>lmim"
")" = "@/\\)<ret>hmim"
"[" = "@/\\[<ret>lmim"
"]" = "@/\\]<ret>hmim"
"{" = "@/\\{<ret>lmim"
"}" = "@/\\}<ret>hmim"

[keys.normal.g]
G = "goto_file_end"

e = "move_prev_word_end"
E = "move_prev_long_word_end"
"A-e" = "move_prev_sub_word_end"

[keys.select]
"A-w" = "extend_next_sub_word_start"
"A-e" = "extend_next_sub_word_end"
"A-b" = "extend_prev_sub_word_start"

x = "extend_line_down"
"A-x" = "extend_line_up"
X = "extend_to_line_bounds"
"A-X" = "shrink_to_line_bounds"

"{" = "goto_prev_paragraph"
"}" = "goto_next_paragraph"

[keys.select.g]
G = "extend_to_file_end"

e = "extend_prev_word_end"
E = "extend_prev_long_word_end"
"A-e" = "extend_prev_sub_word_end"
