theme = "catppuccin_frappe"

[editor]
mouse = false
shell = ["/opt/homebrew/bin/fish"]
line-number = "relative"
cursorline = true
completion-timeout = 50
rulers = [80, 100, 120]
color-modes = true
popup-border = "menu"
end-of-line-diagnostics = "hint"
inline-diagnostics.cursor-line = "warning"
clipboard-provider = "pasteboard"

[editor.statusline]
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.lsp]
display-progress-messages = true
display-inlay-hints = true

[editor.cursor-shape]
select = "underline"

[editor.file-picker]
hidden = false

[editor.auto-pairs]
'(' = ')'
'{' = '}'
'[' = ']'
'"' = '"'
'`' = '`'
'<' = '>'


[editor.whitespace]
tab = "all"
nbsp = "all"
nnbsp = "all"

[editor.whitespace.characters]
tab = "→"
tabpad = "·"
nbsp = "⍽"
nnbsp = "␣"

[editor.indent-guides]
render = true

[editor.smart-tab]
enable = false
