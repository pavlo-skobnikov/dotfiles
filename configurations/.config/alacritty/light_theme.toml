# All credit goes to the maintainers of the
# `https://github.com/alacritty/alacritty-theme` project.

# Catppuccin Latte theme.

[colors.primary] # Default colors.
background = '#EFF1F5'        # base
foreground = '#4C4F69'        # text
# Bright and dim foreground colors.
dim_foreground = '#4C4F69'    # text
bright_foreground = '#4C4F69' # text

[colors.cursor] # Cursor colors
text = '#EFF1F5'              # base
cursor = '#DC8A78'            # rosewater

[colors.vi_mode_cursor]
text = '#EFF1F5'              # base
cursor = '#7287FD'            # lavender

[colors.search.matches] # Search colors.
foreground = '#EFF1F5'        # base
background = '#6C6F85'        # subtext0

[colors.search.focused_match]
foreground = '#EFF1F5'        # base
background = '#40A02B'        # green

[colors.footer_bar]
foreground = '#EFF1F5'        # base
background = '#6C6F85'        # subtext0

[colors.hints.start] # Keyboard regex hints.
foreground = '#EFF1F5'        # base
background = '#DF8E1D'        # yellow

[colors.hints.end]
foreground = '#EFF1F5'        # base
background = '#6C6F85'        # subtext0

[colors.selection] # Selection colors.
text = '#EFF1F5'              # base
background = '#DC8A78'        # rosewater

[colors.normal] # Normal colors.
black = '#5C5F77'             # subtext1
red = '#D20F39'               # red
green = '#40A02B'             # green
yellow = '#DF8E1D'            # yellow
blue = '#1E66F5'              # blue
magenta = '#EA76CB'           # pink
cyan = '#179299'              # teal
white = '#ACB0BE'             # surface2

[colors.bright] # Bright colors.
black = '#6C6F85'             # subtext0
red = '#D20F39'               # red
green = '#40A02B'             # green
yellow = '#DF8E1D'            # yellow
blue = '#1E66F5'              # blue
magenta = '#EA76CB'           # pink
cyan = '#179299'              # teal
white = '#BCC0CC'             # surface1

[colors.dim] # Dim colors.
black = '#5C5F77'             # subtext1
red = '#D20F39'               # red
green = '#40A02B'             # green
yellow = '#DF8E1D'            # yellow
blue = '#1E66F5'              # blue
magenta = '#EA76CB'           # pink
cyan = '#179299'              # teal
white = '#ACB0BE'             # surface2
